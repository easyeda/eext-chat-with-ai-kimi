<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="/iframe/style.css" />
		<title>Kimi AI Assistant</title>
	</head>
	<body>
		<!-- 聊天窗口容器 -->
		<div id="chat-container"></div>

		<!-- 输入区域 -->
		<div class="input-container">
			<textarea id="message-input" placeholder="在这输入你的问题..." data-i18n-placeholder="input_placeholder"></textarea>
			<div class="button-group">
				<div class="function-buttons">
					<button id="greet-button" class="button-style" title="选择需查询的元件" data-i18n-title="select_component_tooltip">
						<span id="greet-button-text" data-i18n="query_component">查询元件</span>
					</button>
					<button id="similar-button" class="button-style" title="选择需查询的元件" data-i18n-title="select_component_tooltip">
						<span id="similar-button-text" data-i18n="similar_materials">相似物料</span>
					</button>
					<button id="parse-netlist-button" class="button-style">
						<span id="parse-netlist-button-text" data-i18n="analyze_netlist">分析网表</span>
					</button>
					<button id="upload-image-button" class="button-style" style="display: none" title="点击上传原理图或 PCB 的图片" data-i18n-title="upload_image_tooltip">
						<span id="upload-image-button-text" data-i18n="analyze_circuit">分析电路</span>
					</button>
				</div>

				<!-- 配置按钮组 -->
				<div class="button-group-center">
					<button id="config-button" class="button-style">
						<svg viewBox="0 0 24 24">
							<path d="M12 15a3 3 0 100-6 3 3 0 000 6z" />
							<path
								d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"
							/>
						</svg>
					</button>
				</div>

				<button id="send-button">
					<svg class="icon" viewBox="0 0 24 24" width="20" height="20">
						<path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
					</svg>
				</button>
			</div>
		</div>

		<!-- 配置面板 -->
		<div class="config-panel">
			<!-- 配置面板头部 -->
			<div class="config-header">
				<h3 id="config-title" data-i18n="api_settings">API 设置</h3>
				<!-- 关闭按钮 -->
				<button class="close-btn">&times;</button>
			</div>
			<!-- 配置面板内容 -->
			<div class="config-content">
				<div class="input-group">
					<label for="model-select" id="model-select-label" data-i18n="select_model">选择模型</label>
					<select id="model-select" class="modern-input">
						<option value="kimi-k2.6">kimi-k2.6</option>
						<option value="kimi-k2.5">kimi-k2.5</option>
					</select>
				</div>

				<div class="input-group">
					<label for="api-url-input" id="api-url-label" data-i18n="api_url">接口地址</label>
					<input type="text" id="api-url-input" class="modern-input" value="https://api.moonshot.cn/v1/chat/completions" />
				</div>
				<!-- API密钥输入组 -->
				<div class="input-group">
					<label for="api-key-input" id="api-key-label" data-i18n="api_key">API密钥</label>
					<input type="text" id="api-key-input" class="modern-input" placeholder="请输入API Key" data-i18n-placeholder="enter_api_key" />
				</div>
				<!-- 获取API凭证链接 -->
				<a href="https://lceda001.feishu.cn/wiki/V9ScwIjk0iBc8fk9RhWcork9nGc?from=from_copylink" class="tutorial-link" target="_blank">
					<span class="help-icon">?</span> <span id="api-tutorial-text" data-i18n="how_to_get_api_credentials">如何获取API凭证</span>
				</a>
			</div>
		</div>

		<script>
			var edaObj = (typeof eda !== 'undefined') ? eda : (window.parent && window.parent.eda);
			function t(tag, ...args) {
				if (edaObj && edaObj.sys_I18n) return edaObj.sys_I18n.text(tag, undefined, undefined, ...args);
				return _i18nDict[tag] || tag;
			}

			var _i18nDict = {
				'page_title': 'Kimi AI助手',
				'input_placeholder': '在这输入你的问题...',
				'select_component_tooltip': '选择需查询的元件',
				'query_component': '查询元件',
				'similar_materials': '相似物料',
				'analyze_netlist': '分析网表',
				'analyze_circuit': '分析电路',
				'api_settings': 'API 设置',
				'select_model': '选择模型',
				'api_url': '接口地址',
				'api_key': 'API密钥',
				'enter_api_key': '请输入API Key',
				'how_to_get_api_credentials': '如何获取API凭证',
				'upload_image_tooltip': '点击上传原理图或 PCB 的图片',
				'please_fill_url_and_key': '请填写URL和Key',
				'click_component_in_schematic': '请左键单击原理图中需查询的元件',
				'introduce_component_function': '请介绍 ${1} 的功能及应用场景',
				'introduce_similar_materials': '请介绍 ${1} 的相似物料',
				'fetching_netlist_data': '正在获取网表数据...',
				'netlist_fetch_failed': '获取网表失败，请确保已打开原理图',
				'analyze_netlist_message': '请分析当前原理图的网表内容',
				'component_list': '器件列表',
				'connections': '连接关系',
				'send_failed': '发送失败：请检查外部交互是否开启（${1}）',
				'netlist_analysis_failed': '网表分析失败：请检查是否已打开原理图（${1}）',
				'analyze_circuit_from_image': '请根据图片分析电路',
				'paste_failed': '粘贴处理失败：${1}'
			};

			function applyI18n() {
				var els = document.querySelectorAll('[data-i18n]');
				for (var i = 0; i < els.length; i++) {
					els[i].textContent = t(els[i].getAttribute('data-i18n'));
				}
				var phEls = document.querySelectorAll('[data-i18n-placeholder]');
				for (var j = 0; j < phEls.length; j++) {
					phEls[j].placeholder = t(phEls[j].getAttribute('data-i18n-placeholder'));
				}
				var titleEls = document.querySelectorAll('[data-i18n-title]');
				for (var k = 0; k < titleEls.length; k++) {
					titleEls[k].title = t(titleEls[k].getAttribute('data-i18n-title'));
				}
			}

			applyI18n();

			document.addEventListener('DOMContentLoaded', async () => {
				// 获取页面元素
				const chatContainer = document.getElementById('chat-container');
				const messageInput = document.getElementById('message-input');
				const sendButton = document.getElementById('send-button');
				const apiUrlInput = document.getElementById('api-url-input');
				const apiKeyInput = document.getElementById('api-key-input');
				const greetButton = document.getElementById('greet-button'); // 查询元件按钮
				const similarButton = document.getElementById('similar-button'); // 相似器件按钮
				const parseNetlistButton = document.getElementById('parse-netlist-button');
				const modelSelect = document.getElementById('model-select');
				const uploadImageButton = document.getElementById('upload-image-button');

				// Apply i18n to HTML elements
				document.title = t('page_title');
				messageInput.placeholder = t('input_placeholder');
				document.getElementById('greet-button-text').textContent = t('query_component');
				document.getElementById('greet-button').title = t('select_component_tooltip');
				document.getElementById('similar-button-text').textContent = t('similar_materials');
				document.getElementById('similar-button').title = t('select_component_tooltip');
				document.getElementById('parse-netlist-button-text').textContent = t('analyze_netlist');
				document.getElementById('upload-image-button-text').textContent = t('analyze_circuit');
				document.getElementById('upload-image-button').title = t('upload_image_tooltip');
				document.getElementById('config-title').textContent = t('api_settings');
				document.getElementById('model-select-label').textContent = t('select_model');
				document.getElementById('api-url-label').textContent = t('api_url');
				document.getElementById('api-key-label').textContent = t('api_key');
				apiKeyInput.placeholder = t('enter_api_key');
				document.getElementById('api-tutorial-text').textContent = t('how_to_get_api_credentials');

				// 读取本地存储的API配置
				const storedKey = eda.sys_Storage.getExtensionUserConfig('Key');
				const storedUrl = eda.sys_Storage.getExtensionUserConfig('Url');
				const storedModel = eda.sys_Storage.getExtensionUserConfig('Model');

				// 如果本地存储中有API配置，填充到输入框
				if (storedUrl) {
					apiUrlInput.value = storedUrl;
				}
				if (storedKey) {
					apiKeyInput.value = storedKey;
				}
				if (storedModel) {
					// 验证存储的模型是否在可选列表中
					const validModels = ['kimi-k2.6', 'kimi-k2.5'];
					if (validModels.includes(storedModel)) {
						modelSelect.value = storedModel;
					}
				}

				// 打开配置面板
				document.getElementById('config-button').addEventListener('click', (e) => {
					e.stopPropagation();
					const panel = document.querySelector('.config-panel');
					panel.classList.toggle('show');
				});

				// 关闭配置面板
				document.querySelector('.close-btn').addEventListener('click', () => {
					document.querySelector('.config-panel').classList.remove('show');
				});

				// 点击页面其他区域关闭配置面板
				document.addEventListener('click', (e) => {
					const panel = document.querySelector('.config-panel');
					if (!panel.contains(e.target) && e.target.id !== 'config-button' && !e.target.closest('#config-button')) {
						panel.classList.remove('show');
					}
				});

				// 监听API URL输入变化并保存到本地存储
				apiUrlInput.addEventListener('input', () => {
					eda.sys_Storage.setExtensionUserConfig('Url', apiUrlInput.value);
				});

				// 监听API Key输入变化并保存到本地存储
				apiKeyInput.addEventListener('input', () => {
					eda.sys_Storage.setExtensionUserConfig('Key', apiKeyInput.value);
				});

				// 设置默认模型为 Kimi 文本模型（支持网表分析）
				if (!storedModel) {
					const defaultModel = 'kimi-k2.5';
					modelSelect.value = defaultModel;
					eda.sys_Storage.setExtensionUserConfig('Model', defaultModel);
				}

				// 监听模型选择变化
				modelSelect.addEventListener('change', () => {
					const selectedModel = modelSelect.value;

					uploadImageButton.style.display = 'block';
					parseNetlistButton.style.display = 'block';

					eda.sys_Storage.setExtensionUserConfig('Model', selectedModel);
				});

				modelSelect.dispatchEvent(new Event('change'));

				// 消息相关变量
				let id = 0;
				let reader; // 用于存储流式读取器
				let isStreaming = false; // 是否正在流式传输

				// 初始化消息存储
				let messages = []; // 存储对话历史
				const systemMessages = [
					{
						role: 'system',
						content:
							'你是一个专业的电路设计助手，具备深厚的电路设计知识和丰富的实践经验。你擅长回答与电路图、原理图设计、器件选择、电路调试、信号完整性分析、电源完整性分析、电磁兼容性（EMC）设计、电路板布局布线等相关问题。你的任务是为用户提供准确、详细且实用的建议，帮助用户解决电路设计中的各种问题。',
						//'你是一个专业的电路设计助手，擅长回答与电路图、原理图设计、器件选择等相关问题。你的任务是为用户提供准确、详细且实用的建议，帮助用户解决电路设计中的问题。请确保你的回答符合以下要求：1. 提供清晰的电路设计指导。2. 解释器件选择的原则和建议。3. 帮助用户优化电路图和原理图设计。4. 回答应尽量简洁明了，避免不必要的复杂性。5. 如果用户的问题涉及具体器件或电路功能，请提供相关的技术细节和注意事项。',
					},
				];

				const systemMessagesVision = [
					{
						role: 'system',
						content:
							'你是一个专业的电路设计助手，具备深厚的电路设计知识和丰富的实践经验。你擅长通过电路原理图图片或PCB电路图片回答与电路设计相关的问题。你的任务是为用户提供准确、详细且实用的建议，帮助用户解决电路设计中的问题。',
					},
				];

				async function sendMessage(event) {
					try {
						event.preventDefault();
						const message = messageInput.value.trim();

						if (message) {
							// 生成消息ID
							id++;
							// 添加用户消息到历史
							messages.push({
								role: 'user',
								content: message,
							});

							// 显示用户消息
							displayMessage(message, null, true);

							// 如果API地址或密钥未填写，提示用户
							if (apiUrlInput.value === '' || apiKeyInput.value === '') {
								eda.sys_ToastMessage.showMessage(t('please_fill_url_and_key'), 1);
								return;
							}

							// 构造API请求数据
							const apiUrl = apiUrlInput.value;
							const apiKey = apiKeyInput.value;

							// 限制上下文长度为最新20条消息
							const limitedMessages = systemMessages.concat(messages.slice(-20));

							// 打印传递给AI的上下文
							console.log('Context sent to AI:', limitedMessages);

							// 清空输入框
							messageInput.value = '';

							const response = await eda.sys_ClientUrl.request(
								apiUrl,
								'POST',
								JSON.stringify({
									model: modelSelect.value,
									messages: limitedMessages, // 合并系统消息和对话历史
									temperature: 1,
									stream: true,
								}),
								{
									headers: {
										'Content-Type': 'application/json',
										'Authorization': `Bearer ${apiKey}`,
									},
								},
							);

							if (!response.ok) {
								const errBody = await response.text();
								let errMsg = `HTTP ${response.status}`;
								try {
									const errJson = JSON.parse(errBody);
									if (errJson.error && errJson.error.message) {
										errMsg += `：${errJson.error.message}`;
									} else {
										errMsg += `：${errBody}`;
									}
								} catch (_) {
									errMsg += `：${errBody || response.statusText}`;
								}
								console.error('请求失败:', errMsg);
								displayError(errMsg);
								return;
							}

							const reader = response.body.getReader();
							isStreaming = true;

							sendButton.innerHTML = `<svg class="icon" viewBox="0 0 24 24" width="20" height="20">
			                <path fill="currentColor" d="M6 6h12v12H6z" />
			            </svg>`;
							sendButton.removeEventListener('click', sendMessage);
							sendButton.addEventListener('click', () => stopStreaming(reader, sendButton));

							// 用于拼接流式传输的完整消息
							let assistantMessage = '';

							while (isStreaming) {
								const { done, value } = await reader.read();
								if (done || !isStreaming) break;

								const decoder = new TextDecoder();
								const chunk = decoder.decode(value, { stream: true });
								const lines = chunk.split('\n');

								lines.forEach((line) => {
									if (line.startsWith('data: ')) {
										const data = line.substring(6);
										if (data === '[DONE]') return;

										try {
											const chunkJson = JSON.parse(data);
											const content = chunkJson.choices[0].delta.content;
											if (content) {
												// 拼接流式传输的完整消息
												assistantMessage += content;

												// 逐步显示AI的回复
												displayMessage(content, id, false);
											}
										} catch (error) {
											console.error('Error parsing chunk:', error);
										}
									}
								});
							}

							// 将拼接后的完整消息添加到对话历史
							if (assistantMessage) {
								messages.push({
									role: 'assistant',
									content: assistantMessage,
								});
							}

							// 恢复按钮状态
							sendButton.innerHTML = `<svg class="icon" viewBox="0 0 24 24" width="20" height="20">
			                <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
			            </svg>`;
							sendButton.removeEventListener('click', () => stopStreaming(reader, sendButton));
							sendButton.addEventListener('click', sendMessage);
							isStreaming = false;
						}
					} catch (error) {
						console.error('Upload failed:', error);
						displayError(t('send_failed', error.message || error));
					}
				}

				// 停止流式传输函数
				function stopStreaming(reader, button) {
					if (reader) {
						reader.cancel();
					}
					button.innerHTML = `<svg class="icon" viewBox="0 0 24 24" width="20" height="20">
			            <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
			        </svg>`;
					button.removeEventListener('click', stopStreaming);
					button.addEventListener('click', sendMessage);
				}

				// 显示消息函数
				function displayMessage(message, id, user) {
					message = message.replaceAll('\n', '<br />');

					let messageDiv;
					if (id) {
						messageDiv = document.getElementById(id);
						if (!messageDiv) {
							messageDiv = document.createElement('div');
							messageDiv.setAttribute('id', id);
						}
					} else {
						messageDiv = document.createElement('div');
					}

					if (user) {
						messageDiv.style.marginLeft = 'auto';
						messageDiv.className = 'user-message';
					} else {
						messageDiv.style.marginRight = 'auto';
						messageDiv.className = 'ai-message';
					}
					messageDiv.innerHTML += message;

					if (!messageDiv.parentNode) {
						chatContainer.appendChild(messageDiv);
					}

					chatContainer.scrollTop = chatContainer.scrollHeight;
				}

				// 显示错误消息到对话框
				function displayError(message) {
					const errorDiv = document.createElement('div');
					errorDiv.className = 'error-message';
					errorDiv.innerHTML = `⚠ ${message}`;
					chatContainer.appendChild(errorDiv);
					chatContainer.scrollTop = chatContainer.scrollHeight;
				}

				/**
				 * 发送元件查询请求
				 */
				async function sendGreeting() {
					// 监听元件选择事件
					eda.sys_ToastMessage.showMessage(t('click_component_in_schematic'), 3);
					eda.sch_Event.addMouseEventListener(
						'sendGreeting',
						'selected',
						async (eventType) => {
							const selectedPrimitives = await eda.sch_SelectControl.getAllSelectedPrimitives();
							if (selectedPrimitives.length > 0) {
								const component = selectedPrimitives[0];
								if (component.subPartName) {
									// 获取元件名称，去掉后缀 ".1"
									const newStr = component.subPartName.split('.');
									newStr.pop();
									const message = t('introduce_component_function', newStr.join('.'));
									messageInput.value = message;
									sendMessage({ preventDefault: () => {} });
								}
							}
						},
						true,
					);
				}

				/**
				 * 发送相似物料查询请求
				 */
				async function similarGreeting() {
					// 监听元件选择事件
					eda.sys_ToastMessage.showMessage(t('click_component_in_schematic'), 3);
					eda.sch_Event.addMouseEventListener(
						'similarGreeting',
						'selected',
						async (eventType) => {
							const selectedPrimitives = await eda.sch_SelectControl.getAllSelectedPrimitives();
							if (selectedPrimitives.length > 0) {
								const component = selectedPrimitives[0];
								if (component.subPartName) {
									// 获取元件名称，去掉后缀 ".1"
									const newStr = component.subPartName.split('.');
									newStr.pop();
									const message = t('introduce_similar_materials', newStr.join('.'));
									messageInput.value = message;
									sendMessage({ preventDefault: () => {} });
								}
							}
						},
						true,
					);
				}

				/**
				 * 解析网表并发送给 AI
				 */
				async function parseNetlist() {
					try {
						// 如果API地址或密钥未填写，提示用户
						if (apiUrlInput.value === '' || apiKeyInput.value === '') {
							eda.sys_ToastMessage.showMessage(t('please_fill_url_and_key'), 1);
							return;
						}

						eda.sys_ToastMessage.showMessage(t('fetching_netlist_data'), 3);

						const netlistString = await eda.sch_Netlist.getNetlist('JLCEDA');

						if (!netlistString) {
							eda.sys_ToastMessage.showMessage(t('netlist_fetch_failed'), 1);
							return;
						}

						// 解析网表JSON并精简关键信息
						let simplifiedNetlist = '';
						try {
							const netlistData = JSON.parse(netlistString);
							console.log('原始网表数据:', netlistData);

							// 精简网表信息，只保留关键信息
							const components = [];
							const connections = [];

							for (const [componentId, component] of Object.entries(netlistData)) {
								if (component.props && component.pins) {
									// 提取关键器件信息
									const componentInfo = {
										designator: component.props.Designator || componentId,
										name: component.props['Manufacturer Part'] || component.props.DeviceName || component.props.Name,
										value: component.props.Value,
										description: component.props.Description,
										pins: component.pins,
									};

									// 过滤掉空值
									Object.keys(componentInfo).forEach((key) => {
										if (!componentInfo[key] || componentInfo[key] === '') {
											delete componentInfo[key];
										}
									});

									components.push(componentInfo);

									// 收集连接信息
									for (const [pinNum, netName] of Object.entries(component.pins)) {
										if (netName && netName !== '') {
											connections.push({
												component: componentInfo.designator,
												pin: pinNum,
												net: netName,
											});
										}
									}
								}
							}

							// 构建精简的网表描述
							simplifiedNetlist = `${t('component_list')}:\n${components
								.map(
									(comp) =>
										`${comp.designator}: ${comp.name || ''}${comp.value ? ` (${comp.value})` : ''}${comp.description ? ` - ${comp.description.substring(0, 50)}...` : ''}`,
								)
								.join('\n')}\n\n${t('connections')}:\n${connections.map((conn) => `${conn.component}.${conn.pin} -> ${conn.net}`).join('\n')}`;

							console.log('精简后的网表信息:', simplifiedNetlist);
						} catch (error) {
							console.error('网表解析错误:', error);
							// 如果解析失败，使用原始字符串的前1000个字符
							simplifiedNetlist = netlistString.substring(0, 1000) + (netlistString.length > 1000 ? '...' : '');
							console.log('使用截断的原始网表:', simplifiedNetlist);

						const fullUserMessage = t('full_netlist_analysis_message').replace('${1}', simplifiedNetlist);

						messages.push({
							role: 'user',
							content: fullUserMessage,

						const limitedMessages = systemMessages.concat(messages.slice(-20));

									'Content-Type': 'application/json',
									'Authorization': `Bearer ${apiKey}`,

							const errBody = await response.text();
							let errMsg = `HTTP ${response.status}`;
							try {
								const errJson = JSON.parse(errBody);
								if (errJson.error && errJson.error.message) {
									errMsg += `：${errJson.error.message}`;
								} else {
									errMsg += `：${errBody}`;
								}
							} catch (_) {
								errMsg += `：${errBody || response.statusText}`;
							}
							console.error('请求失败:', errMsg);
							displayError(errMsg);
							return;
						}

						const streamReader = response.body.getReader();
						isStreaming = true;
						id++;

						sendButton.innerHTML = `<svg class="icon" viewBox="0 0 24 24" width="20" height="20">
							<path fill="currentColor" d="M6 6h12v12H6z" />
						</svg>`;
						sendButton.removeEventListener('click', sendMessage);
						sendButton.addEventListener('click', () => stopStreaming(streamReader, sendButton));

						let assistantMessage = '';

						while (isStreaming) {
							const { done, value } = await streamReader.read();
							if (done || !isStreaming) break;

							const decoder = new TextDecoder();
							const chunk = decoder.decode(value, { stream: true });
							const lines = chunk.split('\n');

							lines.forEach((line) => {
								if (line.startsWith('data: ')) {
									const data = line.substring(6);
									if (data === '[DONE]') return;

									try {
										const chunkJson = JSON.parse(data);
										const content = chunkJson.choices[0].delta.content;
										if (content) {
											assistantMessage += content;
											displayMessage(content, id, false);
										}
									} catch (error) {
										console.error('Error parsing chunk:', error);
									}
								}
							});
						}

						if (assistantMessage) {
							messages.push({
								role: 'assistant',
								content: assistantMessage,
							});
						}

						// 恢复按钮状态
						sendButton.innerHTML = `<svg class="icon" viewBox="0 0 24 24" width="20" height="20">
							<path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
						</svg>`;
						sendButton.removeEventListener('click', () => stopStreaming(streamReader, sendButton));
						sendButton.addEventListener('click', sendMessage);
						isStreaming = false;
					} catch (error) {
						console.error('网表分析失败:', error);
						displayError(t('netlist_analysis_failed', error.message || error));

							const limitedMessages = systemMessagesVision.concat(messages.slice(-20));

							id++;

            <path fill="currentColor" d="M6 6h12v12H6z" />
            </svg>`;
							sendButton.removeEventListener('click', sendMessage);
							sendButton.addEventListener('click', () => stopStreaming(reader, sendButton));

							// 用于拼接流式传输的完整消息
							let assistantMessage = '';

							while (isStreaming) {
								const { done, value } = await reader.read();

								const decoder = new TextDecoder();

								lines.forEach((line) => {
									if (line.startsWith('data: ')) {
										const data = line.substring(6);

											if (apiUrlInput.value === '' || apiKeyInput.value === '') {

											const apiUrl = apiUrlInput.value;
											const apiKey = apiKeyInput.value;

											// 限制上下文长度为最新20条消息
											const limitedMessages = systemMessagesVision.concat(messages.slice(-20));

											messageInput.value = '';

												'POST',
												JSON.stringify({
													model: modelSelect.value,

												let errMsg = `HTTP ${response.status}`;
												try {
													const errJson = JSON.parse(errBody);
													if (errJson.error && errJson.error.message) {
														errMsg += `：${errJson.error.message}`;
													} else {
														errMsg += `：${errBody}`;
													}
												} catch (_) {
													errMsg += `：${errBody || response.statusText}`;
												}
												console.error('请求失败:', errMsg);
												displayError(errMsg);
												return;
											}

											const reader = response.body.getReader();
											isStreaming = true;

											// 生成新的消息ID
											id++;

											sendButton.innerHTML = `<svg class="icon" viewBox="0 0 24 24" width="20" height="20">
                                <path fill="currentColor" d="M6 6h12v12H6z" />
                                </svg>`;

											let assistantMessage = '';

																assistantMessage += content;

													role: 'assistant',
													content: assistantMessage,
												});

										reader.readAsDataURL(file);
									}
								}
							}
						}
						// 如果没有图片，允许默认的文本粘贴行为
					} catch (error) {
						console.error('粘贴处理失败:', error);
						displayError(t('paste_failed', error.message || error));
					}
				});

				// 绑定发送按钮点击事件
				sendButton.addEventListener('click', sendMessage);

				// 绑定回车键发送消息事件
				messageInput.addEventListener('keypress', (event) => {

					}

				greetButton.addEventListener('click', async () => {
					if (isStreaming) {
						stopStreaming();
					}
					await sendGreeting();
				});

				// 绑定相似器件按钮点击事件
				similarButton.addEventListener('click', async () => {
					if (isStreaming) {
						stopStreaming();
					}
					await similarGreeting();

				// 绑定检查引脚按钮点击事件
				parseNetlistButton.addEventListener('click', async () => {
